<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>دستیار Dr. Khoshgoftar</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Vazirmatn', sans-serif;
      background: #0f0f13;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .chat-container {
      width: 100%;
      max-width: 440px;
      background: #18181f;
      border-radius: 20px;
      border: 1px solid #2a2a35;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 90vh;
      max-height: 640px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }
    .chat-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #2a2a35;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #1c1c25;
    }
    .avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00b4d8, #0077b6);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .header-info strong { display: block; font-size: 14px; font-weight: 600; color: #e8e8f0; }
    .header-info span { font-size: 12px; color: #4ade80; }
    .status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #4ade80; margin-left: 4px; vertical-align: middle; }
    #messages {
      flex: 1; overflow-y: auto; padding: 1rem;
      display: flex; flex-direction: column; gap: 10px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #2a2a35; border-radius: 4px; }
    .msg {
      max-width: 82%; padding: 10px 14px;
      font-size: 14px; line-height: 1.6;
      border-radius: 16px; word-break: break-word;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .msg.bot { background: #222230; color: #d8d8e8; align-self: flex-start; border-bottom-right-radius: 4px; }
    .msg.user { background: linear-gradient(135deg, #00b4d8, #0077b6); color: #fff; align-self: flex-end; border-bottom-left-radius: 4px; }
    .msg.typing { display: flex; align-items: center; gap: 5px; padding: 14px 16px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #666; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-7px)} }
    .input-row {
      display: flex; gap: 8px; padding: 10px 12px;
      border-top: 1px solid #2a2a35; background: #1c1c25;
    }
    #user-input {
      flex: 1; background: #111118; border: 1px solid #2a2a35;
      border-radius: 14px; padding: 10px 14px; font-size: 14px;
      font-family: 'Vazirmatn', sans-serif; color: #e0e0f0;
      outline: none; resize: none; max-height: 100px; line-height: 1.5;
    }
    #user-input:focus { border-color: #00b4d8; }
    #user-input::placeholder { color: #444; }
    #send-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: #00b4d8; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; align-self: flex-end;
      transition: background 0.15s, transform 0.1s;
    }
    #send-btn:hover { background: #0077b6; }
    #send-btn:active { transform: scale(0.93); }
    #send-btn:disabled { background: #333; cursor: not-allowed; }
    #send-btn svg { width: 18px; height: 18px; fill: #fff; }
    .footer-note { text-align: center; font-size: 11px; color: #333; padding: 6px; background: #14141b; }
  </style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="avatar">👨‍🏫</div>
    <div class="header-info">
      <strong>Dr. M. J. Khoshgoftar</strong>
      <span><span class="status-dot"></span>آماده پاسخگویی</span>
    </div>
  </div>

  <div id="messages">
    <div class="msg bot">سلام! 👋 من دستیار هوشمند Dr. Khoshgoftar هستم. درباره تحقیقات، دروس، همکاری علمی یا هر چیز دیگه‌ای سوال داری؟</div>
  </div>

  <div class="input-row">
    <textarea id="user-input" rows="1" placeholder="سوالت رو بنویس..."></textarea>
    <button id="send-btn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M3.4 20.4l17.45-7.48a1 1 0 0 0 0-1.84L3.4 3.6a.993.993 0 0 0-1.39.91L2 9.12c0 .5.37.93.87.99L17 12 2.87 13.88c-.5.07-.87.5-.87 1l.01 4.51c0 .71.73 1.2 1.39.91z"/></svg>
    </button>
  </div>
  <div class="footer-note">powered by DeepSeek AI</div>
</div>

<script>
  // ============================================================
  // 🔑 API KEY دیپ‌سیک رو اینجا بذار
  const API_KEY = "sk-65f4c84e69af4c3c9ab8cc151cdebbbb";
  // ============================================================

  const SYSTEM_PROMPT = `تو M. J. Khoshgoftar هستی — استاد دانشیار مهندسی مکانیک دانشگاه اراک.

اطلاعات واقعی تو:
- تحصیلات: دکترا و کارشناسی ارشد از دانشگاه تربیت مدرس، کارشناسی از دانشگاه کاشان
- سابقه: استاد دانشیار دانشگاه اراک از ۲۰۱۷ تاکنون
- پژوهشگر مهمان در TU Delft هلند (2019) و دانشگاه پاویا ایتالیا (2013-2014)
- حوزه تخصصی: مواد و سازه‌های cellular و auxetic، مواد کامپوزیت، تحلیل اجزای محدود (FEM)، نانوتیرها، مواد تابع‌دار (FGM)
- مقالات در مجلات معتبر: Advanced Engineering Materials، Nature Scientific Reports، Springer، SAGE، Elsevier
- ایمیل تماس: mj.khoshgoftar@gmail.com

لحن و شخصیت:
- دوستانه اما حرفه‌ای، مثل یک استاد که با دانشجو صحبت می‌کند
- مختصر و مفید — جواب‌های طولانی بی‌مورد نده
- اگر سوال درباره پژوهش، تدریس یا همکاری علمی است، با اشتیاق جواب بده
- اگر چیزی نمی‌دونی، صادقانه بگو و پیشنهاد بده از طریق mj.khoshgoftar@gmail.com تماس بگیرند
- هم فارسی هم انگلیسی جواب بده، بسته به زبان سوال
- هرگز اطلاعات نادرست اختراع نکن`;

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  let history = [];

  function addMsg(text, role) {
    const d = document.createElement('div');
    d.className = 'msg ' + role;
    d.textContent = text;
    messagesEl.appendChild(d);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return d;
  }

  function showTyping() {
    const d = document.createElement('div');
    d.className = 'msg bot typing';
    d.id = 'typing-indicator';
    d.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    messagesEl.appendChild(d);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    addMsg(text, 'user');
    history.push({ role: 'user', content: text });
    showTyping();
    sendBtn.disabled = true;
    inputEl.disabled = true;

    try {
      const res = await fetch('https://api.deepseek.com/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + API_KEY
        },
        body: JSON.stringify({
          model: 'deepseek-chat',
          messages: [
            { role: 'system', content: SYSTEM_PROMPT },
            ...history
          ],
          max_tokens: 1000
        })
      });
      const data = await res.json();
      if (data.error) {
        removeTyping();
        addMsg('❌ خطا: ' + data.error.message, 'bot');
      } else {
        const reply = data.choices?.[0]?.message?.content || 'پاسخی دریافت نشد.';
        removeTyping();
        addMsg(reply, 'bot');
        history.push({ role: 'assistant', content: reply });
      }
    } catch(e) {
      removeTyping();
      addMsg('❌ خطا در اتصال به سرور.', 'bot');
    }
    sendBtn.disabled = false;
    inputEl.disabled = false;
    inputEl.focus();
  }

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
  });
</script>
</body>
</html>
