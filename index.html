<script>
const API_KEY = "sk-65f4c84e69af4c3c9ab8cc151cdebbbb";

const SYSTEM_PROMPT = `تو M. J. Khoshgoftar هستی — استاد دانشیار مهندسی مکانیک دانشگاه اراک.

اطلاعات واقعی:
- دانشیار مهندسی مکانیک دانشگاه اراک
- دکتری و کارشناسی ارشد از دانشگاه تربیت مدرس
- کارشناسی از دانشگاه کاشان
- پژوهشگر مهمان TU Delft هلند و University of Pavia ایتالیا
- حوزه تخصصی: Cellular Materials, Auxetic Structures, Composite Materials, FEM, Nanobeams, FGM
- پاسخ‌ها حرفه‌ای، دقیق و مختصر باشند.
- فارسی و انگلیسی را متناسب با زبان کاربر استفاده کن.
- اگر از موضوعی مطمئن نیستی، صادقانه اعلام کن.
- برای همکاری علمی یا اطلاعات بیشتر، ایمیل زیر را معرفی کن:
  mj.khoshgoftar@gmail.com`;

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

let history = [];

function addMsg(text, role) {
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.textContent = text;
  messagesEl.appendChild(d);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return d;
}

function showTyping() {
  const d = document.createElement('div');
  d.className = 'msg bot typing';
  d.id = 'typing-indicator';
  d.innerHTML = `
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
  `;
  messagesEl.appendChild(d);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function send() {

  const text = inputEl.value.trim();

  if (!text) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';

  addMsg(text, 'user');

  history.push({
    role: 'user',
    content: text
  });

  showTyping();

  sendBtn.disabled = true;
  inputEl.disabled = true;

  try {

    const response = await fetch(
      "https://api.deepseek.com/chat/completions",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${API_KEY}`
        },
        body: JSON.stringify({
          model: "deepseek-chat",
          messages: [
            {
              role: "system",
              content: SYSTEM_PROMPT
            },
            ...history
          ],
          temperature: 0.7,
          max_tokens: 1000,
          stream: false
        })
      }
    );

    const data = await response.json();

    removeTyping();

    if (data.error) {
      addMsg(
        "❌ " + (data.error.message || "خطای API"),
        "bot"
      );
    } else {

      const reply =
        data.choices?.[0]?.message?.content ||
        "پاسخی دریافت نشد.";

      addMsg(reply, "bot");

      history.push({
        role: "assistant",
        content: reply
      });
    }

  } catch (err) {

    removeTyping();

    addMsg(
      "❌ خطا در اتصال به DeepSeek",
      "bot"
    );

    console.error(err);

  } finally {

    sendBtn.disabled = false;
    inputEl.disabled = false;
    inputEl.focus();

  }
}

inputEl.addEventListener('keydown', e => {

  if (e.key === 'Enter' && !e.shiftKey) {

    e.preventDefault();

    send();
  }
});

inputEl.addEventListener('input', () => {

  inputEl.style.height = 'auto';

  inputEl.style.height =
    Math.min(inputEl.scrollHeight, 100) + 'px';
});
</script>
